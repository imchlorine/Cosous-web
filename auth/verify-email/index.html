<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification — Cosous</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../auth.css">
</head>
<body>

    <div class="card">
        <span class="brand"><img src="/assets/favicon.svg" alt=""> Cosous</span>
        <div id="icon" class="icon is-info"><svg class="spin" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9" stroke-width="2.2"/></svg></div>
        <h1 id="title">Verifying...</h1>
        <p id="message">Please wait while we check your link.</p>
        <div id="action-area"></div>
    </div>

    <script src="../auth.js"></script>
    <script>
        // 1. Parse the URL parameters
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const errorDescription = params.get('error_description');
        
        // Configuration: Change this to your Xcode URL Scheme
        const appScheme = "Cosous://login-callback";

        const titleEl = document.getElementById('title');
        const messageEl = document.getElementById('message');
        const actionArea = document.getElementById('action-area');

        // 2. CASE: SUCCESS (Link is valid)
        if (code && !error) {
            setAuthIcon("check", "success");
            titleEl.innerText = "Verified!";
            messageEl.innerText = "Your email is confirmed. Redirecting you to the app...";
            
            // Attempt auto-redirect to SwiftUI app
            const deepLink = `${appScheme}?code=${code}`;
            window.location.href = deepLink;

            // Show manual button if redirect is blocked by browser
            setTimeout(() => {
                actionArea.innerHTML = `<a href="${deepLink}" class="btn btn-success">Open App</a>`;
            }, 2000);
        } 
        
        // 3. CASE: ERROR (Expired, Invalid, or Already Used)
        else {
            setAuthIcon("alert", "error");
            titleEl.innerText = "Link Expired";
            
            // Use Supabase's error message or a default one
            messageEl.innerText = errorDescription || "This verification link is no longer valid or has already been used.";
            
            actionArea.innerHTML = `
                <a href="Cosous://resend" class="btn btn-error">Return to App</a>
                <p class="hint">Tip: Request a new link from the login screen.</p>
            `;
        }
    </script>
</body>
</html>
