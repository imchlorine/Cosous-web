<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Email Verification — Cosous</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../auth.css">
</head>
<body>

    <div class="card">
        <span class="brand"><img src="/assets/favicon.svg" alt=""> Cosous</span>
        <div id="icon" class="icon is-info"><svg viewBox="0 0 24 24"><rect x="2.5" y="4.5" width="19" height="15" rx="2.5"/><path d="m3 6.5 9 6 9-6"/></svg></div>
        <h1 id="title">Verifying Email</h1>
        <p id="message">Linking your email to your account...</p>
        <div id="action-area"></div>
    </div>

    <script src="../auth.js"></script>
    <script>
        // Parse the URL fragments/params
        // Supabase often puts tokens in the hash (#) or query (?) depending on config
        const params = new URLSearchParams(window.location.search || window.location.hash.substring(1));
        const code = params.get('code');
        const error = params.get('error');
        const errorDescription = params.get('error_description');
        
        // 1. Configuration: Match your SwiftUI URL Scheme
        // We change 'reset-password' to 'link-email' so your app knows which screen to show
        const appScheme = "Cosous://link-email";

        const titleEl = document.getElementById('title');
        const messageEl = document.getElementById('message');
        const actionArea = document.getElementById('action-area');

        // 2. CASE: SUCCESS
        if (code && !error) {
            titleEl.innerText = "Email Verified!";
            messageEl.innerText = "Success! Returning you to the app to complete the connection.";
            
            const deepLink = `${appScheme}?code=${code}`;
            
            // Auto-redirect
            window.location.href = deepLink;

            // Fallback button if auto-redirect fails
            setTimeout(() => {
                actionArea.innerHTML = `<a href="${deepLink}" class="btn btn-primary">Open Cosous</a>`;
            }, 1500);
        } 
        
        // 3. CASE: ERROR
        else if (error) {
            setAuthIcon("alert", "error");
            titleEl.innerText = "Verification Failed";
            messageEl.innerText = errorDescription || "This link has expired or is invalid.";
            
            // Redirect back to your settings or security page
            actionArea.innerHTML = `
                <a href="Cosous://settings" class="btn btn-error">Back to Settings</a>
                <p class="hint">Please try linking your email again.</p>
            `;
        }
        
        // 4. CASE: DIRECT ACCESS (No code)
        else {
            titleEl.innerText = "Invalid Link";
            messageEl.innerText = "Please use the link sent to your email address.";
            actionArea.innerHTML = `<a href="Cosous://home" class="btn btn-primary">Open App</a>`;
        }
    </script>
</body>
</html>
