<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Email Verification</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f9f9f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 90%; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #111827; }
        p { color: #6b7280; line-height: 1.5; margin-bottom: 25px; }
        .btn { display: inline-block; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: transform 0.1s; cursor: pointer; border: none; }
        .btn-primary { background-color: #3ecf8e; color: white; }
        .btn-error { background-color: #ef4444; color: white; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <div id="icon" class="icon">📧</div>
        <h1 id="title">Verifying Email</h1>
        <p id="message">Linking your email to your account...</p>
        <div id="action-area"></div>
    </div>

    <script>
        // Parse the URL fragments/params
        // Supabase often puts tokens in the hash (#) or query (?) depending on config
        const params = new URLSearchParams(window.location.search || window.location.hash.substring(1));
        const code = params.get('code');
        const error = params.get('error');
        const errorDescription = params.get('error_description');
        
        // 1. Configuration: Match your SwiftUI URL Scheme
        // We change 'reset-password' to 'link-email' so your app knows which screen to show
        const appScheme = "Cosous://link-email";

        const iconEl = document.getElementById('icon');
        const titleEl = document.getElementById('title');
        const messageEl = document.getElementById('message');
        const actionArea = document.getElementById('action-area');

        // 2. CASE: SUCCESS
        if (code && !error) {
            titleEl.innerText = "Email Verified!";
            messageEl.innerText = "Success! Returning you to the app to complete the connection.";
            
            const deepLink = `${appScheme}?code=${code}`;
            
            // Auto-redirect
            window.location.href = deepLink;

            // Fallback button if auto-redirect fails
            setTimeout(() => {
                actionArea.innerHTML = `<a href="${deepLink}" class="btn btn-primary">Open Cosous</a>`;
            }, 1500);
        } 
        
        // 3. CASE: ERROR
        else if (error) {
            iconEl.innerText = "⚠️";
            titleEl.innerText = "Verification Failed";
            messageEl.innerText = errorDescription || "This link has expired or is invalid.";
            
            // Redirect back to your settings or security page
            actionArea.innerHTML = `
                <a href="Cosous://settings" class="btn btn-error">Back to Settings</a>
                <p style="font-size: 12px; margin-top: 15px; color: #9ca3af;">Please try linking your email again.</p>
            `;
        }
        
        // 4. CASE: DIRECT ACCESS (No code)
        else {
            titleEl.innerText = "Invalid Link";
            messageEl.innerText = "Please use the link sent to your email address.";
            actionArea.innerHTML = `<a href="Cosous://home" class="btn btn-primary">Open App</a>`;
        }
    </script>
</body>
</html>
