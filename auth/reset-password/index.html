<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Cosous</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../auth.css">
</head>
<body>

    <div class="card">
        <span class="brand"><img src="/assets/favicon.svg" alt=""> Cosous</span>
        <div id="icon" class="icon is-info"><svg viewBox="0 0 24 24"><circle cx="7.5" cy="15.5" r="5"/><path d="m11 12 9.5-9.5"/><path d="m15.5 6.5 3 3 2.5-2.5-3-3"/></svg></div>
        <h1 id="title">Reset Password</h1>
        <p id="message">Verifying your request...</p>
        <div id="action-area"></div>
    </div>

    <script src="../auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const errorDescription = params.get('error_description');
        
        // Configuration: Use your same SwiftUI App Scheme
        const appScheme = "Cosous://reset-password";

        const titleEl = document.getElementById('title');
        const messageEl = document.getElementById('message');
        const actionArea = document.getElementById('action-area');

        // 1. Check for missing params (Direct access check)
        if (!code && !error) {
            window.location.href = "/404.html"; // Show the branded 404 page
        }

        // 2. CASE: SUCCESS (Code is present)
        if (code && !error) {
            messageEl.innerText = "Request confirmed! Opening the app to set your new password...";
            
            const deepLink = `${appScheme}?code=${code}`;
            
            // Try to jump to SwiftUI app automatically
            window.location.href = deepLink;

            // Fallback button
            setTimeout(() => {
                actionArea.innerHTML = `<a href="${deepLink}" class="btn btn-primary">Open App</a>`;
            }, 2000);
        } 
        
        // 3. CASE: ERROR (Expired or Invalid)
        else {
            setAuthIcon("alert", "error");
            titleEl.innerText = "Link Expired";
            messageEl.innerText = errorDescription || "This password reset link is invalid or has expired.";
            
            actionArea.innerHTML = `
                <a href="Cosous://forgot-password" class="btn btn-error">Return to App</a>
                <p class="hint">Please request a new link from the login screen.</p>
            `;
        }
    </script>
</body>
</html>
