<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Service — Cosous</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<script>
(function(){
  function norm(v){
    if(!v) return null; v = v.toLowerCase();
    if(v.indexOf('zh')===0) return 'zh';
    if(v.indexOf('es')===0) return 'es';
    if(v.indexOf('ja')===0) return 'ja';
    if(v.indexOf('en')===0) return 'en';
    return null;
  }
  var saved; try{ saved = norm(localStorage.getItem('cosous-lang')); }catch(e){}
  var lang = saved || norm(navigator.language) || 'en';
  location.replace(lang + '/terms.html');
})();
</script>
<noscript><meta http-equiv="refresh" content="0; url=en/terms.html"></noscript>
</head>
